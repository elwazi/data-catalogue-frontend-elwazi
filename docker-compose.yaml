version: '3.3'

services:
  python:
    build: ./scripts
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - scripts/.env
    networks:
      - catalog_network

  react-app:
    build: .
    restart: unless-stopped
    ports:
      - "81:80"
    volumes:
      - .:/app
    env_file:
      - .env  # This will use .env file located at the root of the project
    environment:
      - NODE_ENV=production
    depends_on:
      - python
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - catalog_network

networks:
  catalog_network:
    driver: bridge
